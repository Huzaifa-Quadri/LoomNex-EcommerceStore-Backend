spring.application.name=LoomNex-EcommerceStore

spring.config.import=optional:file:.env[.properties]

server.port=8086

# ─── Database ────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_store?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── JWT Security ────────────────────────────────────────────────
app.security.jwt.secret=${JWT_SECRET}
app.security.jwt.expiration-min=60
app.security.cookie.secure=false

# ─── CORS ────────────────────────────────────────────────────────
app.security.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://127.0.0.1:5500

# ─── Actuator (restrict to health only) ──────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
